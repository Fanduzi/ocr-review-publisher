name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Run release readiness gates
        run: make release-readiness

      - name: Resolve release notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          EN_NOTES="docs/releases/release-notes-${TAG}.md"
          ZH_NOTES="docs/releases/release-notes-${TAG}.zh-CN.md"
          COMBINED="${RUNNER_TEMP}/release-notes-${TAG}-bilingual.md"

          if [ ! -f "$EN_NOTES" ]; then
            echo "::error::Missing English release notes: $EN_NOTES"
            exit 1
          fi
          if [ ! -f "$ZH_NOTES" ]; then
            echo "::error::Missing Chinese release notes: $ZH_NOTES"
            exit 1
          fi

          cat "$EN_NOTES" > "$COMBINED"
          printf '\n---\n\n' >> "$COMBINED"
          cat "$ZH_NOTES" >> "$COMBINED"

          echo "COMBINED_NOTES=$COMBINED" >> "$GITHUB_ENV"

      - name: Run GoReleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Guard against existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "::error::Release ${GITHUB_REF_NAME} already exists. Do not rerun."
            exit 1
          fi

      - name: Publish release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release notes body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --notes-file "${COMBINED_NOTES}"
