name: OCR Compatibility

on:
  schedule:
    - cron: '23 3 * * 1'  # Weekly Monday 03:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-compatibility:
    name: Fixture Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Run compatibility tests
        run: make test-compat

  live-capture:
    name: Live OCR Capture
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capture latest OCR output
        env:
          OCR_LLM_URL: ${{ secrets.OCR_LLM_URL }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_TOKEN }}
          OCR_LLM_MODEL: ${{ secrets.OCR_LLM_MODEL }}
          OCR_USE_ANTHROPIC: ${{ vars.OCR_USE_ANTHROPIC }}
        run: |
          missing=0
          if [ -z "$OCR_LLM_URL" ]; then echo "::error::Missing OCR_LLM_URL secret"; missing=1; fi
          if [ -z "$OCR_LLM_TOKEN" ]; then echo "::error::Missing OCR_LLM_TOKEN secret"; missing=1; fi
          if [ -z "$OCR_LLM_MODEL" ]; then echo "::error::Missing OCR_LLM_MODEL secret"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          bash scripts/capture-ocr-output.sh --ocr-version latest --output /tmp/ocr-latest.json
          echo "Captured OCR output successfully"

      - name: Validate captured output
        env:
          OCR_COMPAT_CAPTURED_OUTPUT: /tmp/ocr-latest.json
        run: |
          if [ -f /tmp/ocr-latest.json ]; then
            go test ./internal/compat -count=1 -v -run TestCapturedOCROutputParses
          else
            echo "No captured output, skipping direct validation"
          fi
